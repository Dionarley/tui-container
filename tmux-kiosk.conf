# === KIOSK MODE ===
set -g mouse on
set -g status on
set -g status-position bottom
set -g status-bg black
set -g status-fg white

# Prefixo
set -g prefix C-a
bind C-a send-prefix

# Bloqueios
unbind C-b
unbind q
unbind x
unbind d
unbind c
unbind &
unbind %
unbind C-c

set -g detach-on-destroy off
set -g remain-on-exit off

# Sessão
new-session -d -s kiosk -n TUI

# Pane 0 (base)
send-keys "cd /workspace" Enter

# Split horizontal (ranger)
split-window -h "ranger"

# Split vertical (micro)
select-pane -t 0
split-window -v "micro"

# Layout balanceado (seguro)
select-layout tiled

select-pane -t 0
